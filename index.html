<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrophysical Black Hole Simulator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', -apple-system, sans-serif; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        #ui-layer { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        
        .panel {
            background: rgba(10, 10, 12, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .panel:hover {
            background: rgba(15, 15, 18, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .data-readout {
            font-family: 'SF Mono', 'Courier New', monospace;
            color: #fff;
            font-weight: 300;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 20px;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 1px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.4); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-end items-center pb-8 md:pb-12">
        <div class="panel p-6 rounded-3xl pointer-events-auto w-[90%] max-w-4xl flex flex-col md:flex-row gap-8 justify-between items-center">
            
            <div class="w-full flex-1">
                <div class="flex justify-between text-[10px] text-gray-400 mb-3 font-mono uppercase tracking-widest">
                    <span>Mass (M_☉)</span>
                    <span id="val-mass" class="data-readout">4.30 x 10^6</span>
                </div>
                <input type="range" id="slider-mass" min="1" max="10" step="0.1" value="4.3">
            </div>

            <div class="w-full flex-1">
                <div class="flex justify-between text-[10px] text-gray-400 mb-3 font-mono uppercase tracking-widest">
                    <span>Accretion Rate (Ṁ)</span>
                    <span id="val-acc" class="data-readout">0.85</span>
                </div>
                <input type="range" id="slider-acc" min="0.1" max="2.0" step="0.05" value="0.85">
            </div>

            <div class="w-full flex-1">
                <div class="flex justify-between text-[10px] text-gray-400 mb-3 font-mono uppercase tracking-widest">
                    <span>Inclination Angle</span>
                    <span id="val-inc" class="data-readout">82°</span>
                </div>
                <input type="range" id="slider-inc" min="0" max="90" step="1" value="82">
            </div>

        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // Position camera dynamically far enough outside the rendering bounds
        let camRadius = 35.0; 
        let camTheta = Math.PI * (82 / 180);
        let camPhi = -0.5;

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                camPhi -= (e.movementX || e.offsetX - previousMousePosition.x) * 0.005;
                camTheta -= (e.movementY || e.offsetY - previousMousePosition.y) * 0.005;
                camTheta = Math.max(0.01, Math.min(Math.PI - 0.01, camTheta));
                document.getElementById('slider-inc').value = Math.round((camTheta / Math.PI) * 180);
                document.getElementById('val-inc').innerText = Math.round((camTheta / Math.PI) * 180) + "°";
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        document.addEventListener('wheel', (e) => {
            camRadius += e.deltaY * 0.02;
            camRadius = Math.max(15.0, Math.min(80.0, camRadius));
        });

        // Map UI Mass (1-10) to internal Shader Geometric Units (0.65 - 2.0)
        // This guarantees the math stays stable and doesn't push the black hole outside the raymarch loop bounds
        function getNormalizedMass(displayValue) {
            return (displayValue / 10.0) * 1.5 + 0.5; 
        }

        const uniforms = {
            u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            u_time: { value: 0.0 },
            u_camPos: { value: new THREE.Vector3() },
            u_camDir: { value: new THREE.Vector3() },
            u_camUp: { value: new THREE.Vector3() },
            u_camRight: { value: new THREE.Vector3() },
            u_mass: { value: getNormalizedMass(4.3) }, 
            u_accretionRate: { value: 0.85 }
        };

        document.getElementById('slider-mass').addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            uniforms.u_mass.value = getNormalizedMass(val);
            document.getElementById('val-mass').innerText = val.toFixed(2) + " x 10^6";
        });

        document.getElementById('slider-acc').addEventListener('input', (e) => {
            uniforms.u_accretionRate.value = parseFloat(e.target.value);
            document.getElementById('val-acc').innerText = parseFloat(e.target.value).toFixed(2);
        });

        document.getElementById('slider-inc').addEventListener('input', (e) => {
            camTheta = (parseFloat(e.target.value) / 180) * Math.PI;
            camTheta = Math.max(0.01, Math.min(Math.PI - 0.01, camTheta)); 
            document.getElementById('val-inc').innerText = e.target.value + "°";
        });

        const fragmentShader = `
            uniform vec2 u_resolution;
            uniform float u_time;
            uniform vec3 u_camPos;
            uniform vec3 u_camDir;
            uniform vec3 u_camUp;
            uniform vec3 u_camRight;
            uniform float u_mass;
            uniform float u_accretionRate;

            #define MAX_STEPS 600
            
            // Advanced Noise & Hash functions for Hyperrealism
            float hash(float n) { return fract(sin(n) * 43758.5453123); }
            float hash3(vec3 p) {
                p = fract(p * vec3(12.9898, 78.233, 45.164));
                p += dot(p, p.yxz + 19.19);
                return fract((p.x + p.y) * p.z);
            }
            float noise(vec3 x) {
                vec3 p = floor(x); vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                float n = p.x + p.y * 57.0 + 113.0 * p.z;
                return mix(mix(mix(hash(n+0.0), hash(n+1.0),f.x), mix(hash(n+57.0), hash(n+58.0),f.x),f.y),
                           mix(mix(hash(n+113.0),hash(n+114.0),f.x), mix(hash(n+170.0),hash(n+171.0),f.x),f.y),f.z);
            }
            float fbm(vec3 p) {
                float f = 0.0; float w = 0.5;
                for(int i = 0; i < 5; i++) {
                    f += w * noise(p); p *= 2.05; w *= 0.5;
                }
                return f;
            }

            // Accurate Blackbody Spectrum
            vec3 getBlackbodyColor(float temp) {
                vec3 color = vec3(0.0);
                temp /= 1000.0; 
                if(temp <= 66.0) color.r = 255.0;
                else color.r = 329.6987 * pow(temp - 60.0, -0.1332);
                if(temp <= 66.0) color.g = 99.47 * log(temp) - 161.119;
                else color.g = 288.12 * pow(temp - 60.0, -0.0755);
                if(temp >= 66.0) color.b = 255.0;
                else if(temp <= 19.0) color.b = 0.0;
                else color.b = 138.51 * log(temp - 10.0) - 305.04;
                return clamp(color / 255.0, 0.0, 1.0);
            }

            // High Fidelity Starfield & Galaxies
            vec3 getDeepSpaceBackground(vec3 dir) {
                // Nebula & Galactic Dust
                vec3 up = vec3(0.0, 1.0, 0.0);
                float galacticPlane = exp(-pow(abs(dot(dir, up)) * 8.0, 1.5));
                
                vec3 dustPos = dir * 15.0;
                float dustNoise = fbm(dustPos) * fbm(dustPos * 0.5 + 5.0);
                vec3 nebulaCol = vec3(0.05, 0.08, 0.15) * 1.5;
                nebulaCol = mix(nebulaCol, vec3(0.15, 0.05, 0.08), fbm(dir * 5.0)); // subtle color variations
                vec3 bgCol = nebulaCol * galacticPlane * dustNoise * 3.0;
                
                // Hyper-realistic Starfield Distribution
                float s1 = hash3(dir * 150.0);
                if(s1 > 0.98) bgCol += mix(vec3(1.0, 0.8, 0.6), vec3(0.7, 0.9, 1.0), hash3(dir * 151.0)) * pow((s1 - 0.98) * 50.0, 2.0);
                
                float s2 = hash3(dir * 350.0);
                if(s2 > 0.995) bgCol += vec3(0.9, 0.95, 1.0) * pow((s2 - 0.995) * 200.0, 2.5);
                
                float s3 = hash3(dir * 600.0); // Micro stars
                if(s3 > 0.99) bgCol += vec3(1.0) * pow((s3 - 0.99) * 100.0, 1.5) * 0.5 * galacticPlane;
                
                return bgCol;
            }

            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / u_resolution.y;
                vec3 ro = u_camPos;
                vec3 rd = normalize(u_camDir + uv.x * u_camRight + uv.y * u_camUp);
                vec3 p = ro; vec3 v = rd;
                
                float M = u_mass; 
                float Rs = 2.0 * M; 
                float R_isco = 3.0 * Rs;
                float R_outer = R_isco + 18.0 * M;
                float MAX_DIST = R_outer + 40.0 * M;
                
                vec3 totalEmission = vec3(0.0); 
                float transmittance = 1.0; 
                bool hitHorizon = false;

                for(int i = 0; i < MAX_STEPS; i++) {
                    float r = length(p);
                    if(r < Rs * 1.01) { hitHorizon = true; break; }
                    if(r > MAX_DIST || transmittance < 0.005) break;
                    
                    // Adaptive Raymarch Steps (Ultra-fine near photon sphere for perfect lensing)
                    float dt = max(0.008 * M, r * 0.012);
                    if(r < 2.5 * Rs) dt *= 0.5; // Double precision near the intense curving region
                    
                    // Gravity integration (Runge-Kutta 1st order / Euler)
                    vec3 h = cross(p, v);
                    vec3 accel = -1.5 * Rs * dot(h, h) / pow(r, 5.0) * p;
                    v = normalize(v + accel * dt);
                    
                    float distFromCenter = length(p.xz);
                    float verticalHeight = abs(p.y);
                    
                    // Flares out slightly less than before for a sharper, more realistic disk
                    float diskThickness = 0.05 * M + distFromCenter * 0.03; 
                    
                    if(verticalHeight < diskThickness && distFromCenter > R_isco && distFromCenter < R_outer) {
                        
                        // Swirling plasma dynamics
                        float angle = atan(p.z, p.x);
                        float orbitalVel = sqrt(M / distFromCenter);
                        float swirlOffset = angle - u_time * orbitalVel * 3.0;
                        vec3 noisePos = vec3(cos(swirlOffset) * distFromCenter, p.y * 8.0, sin(swirlOffset) * distFromCenter) * 1.2 / M;
                        
                        // Structure of the disk
                        float radialFalloff = smoothstep(R_isco, R_isco + 1.5 * M, distFromCenter) * exp(-(distFromCenter - R_isco) * 0.15 / M);
                        float verticalFalloff = exp(-pow(verticalHeight / diskThickness, 2.5) * 6.0);
                        
                        // High-frequency magnetic flow lines
                        float turbulence = fbm(noisePos) * 0.7 + fbm(noisePos * 3.0) * 0.3;
                        float density = radialFalloff * verticalFalloff * turbulence * u_accretionRate * 1.2;
                                      
                        if(density > 0.005) {
                            vec3 gasDir = normalize(vec3(-p.z, 0.0, p.x));
                            float cosTheta = dot(v, gasDir);
                            
                            // True Relativistic Doppler Beaming
                            float doppler = 1.0 / (sqrt(1.0 - orbitalVel*orbitalVel) * (1.0 - orbitalVel * cosTheta));
                            float gravShift = sqrt(1.0 - Rs / distFromCenter);
                            
                            float physicalTemp = 22000.0 * pow(R_isco/distFromCenter, 0.75) * u_accretionRate;
                            float obsTemp = physicalTemp * doppler * gravShift;
                            
                            // Intensity scaling according to Liouville's Theorem
                            float intensity = pow(doppler * gravShift, 4.0);
                            vec3 baseColor = getBlackbodyColor(min(60000.0, obsTemp));
                            
                            float absorption = density * 2.5;
                            float dTrans = exp(-absorption * dt);
                            
                            totalEmission += transmittance * baseColor * density * intensity * (1.0 - dTrans) / absorption * 4.0;
                            transmittance *= dTrans;
                        }
                    }
                    p += v * dt;
                }
                
                if(!hitHorizon && transmittance > 0.005) {
                    totalEmission += getDeepSpaceBackground(v) * transmittance;
                }
                
                // --- HYPERREALISTIC CINEMATIC POST-PROCESSING ---
                vec3 finalCol = totalEmission;

                // Cinematic Glow/Bloom (multi-layered)
                vec3 bloom1 = max(vec3(0.0), finalCol - 1.0);
                vec3 bloom2 = max(vec3(0.0), finalCol - 2.5);
                finalCol += pow(bloom1, vec3(1.5)) * 0.3 + pow(bloom2, vec3(2.0)) * 0.15;

                // ACES Filmic Tone Mapping (Standard in Film/VFX)
                finalCol *= 1.35; // Exposure calibration
                float a = 2.51; float b = 0.03; float c = 2.43; float d = 0.59; float e = 0.14;
                finalCol = (finalCol * (a * finalCol + b)) / (finalCol * (c * finalCol + d) + e);

                // Subtle Anamorphic Flare approximation (Horizontal stretch based on brightness)
                float flareIntensity = max(0.0, totalEmission.b - 1.5) * 0.02;
                finalCol += vec3(0.1, 0.3, 0.8) * flareIntensity * exp(-abs(uv.y) * 20.0) * smoothstep(1.0, 0.0, abs(uv.x));

                // High quality Vignette
                float distToCenter = length(uv);
                finalCol *= smoothstep(0.8, 0.2, distToCenter * distToCenter);

                gl_FragColor = vec4(finalCol, 1.0);
            }
        `;

        const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(2, 2), 
            new THREE.ShaderMaterial({ 
                vertexShader: 'void main() { gl_Position = vec4(position, 1.0); }', 
                fragmentShader, 
                uniforms,
                depthWrite: false,
                depthTest: false
            })
        );
        scene.add(mesh);

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value += 0.005;
            
            const cx = camRadius * Math.sin(camTheta) * Math.cos(camPhi);
            const cy = camRadius * Math.cos(camTheta);
            const cz = camRadius * Math.sin(camTheta) * Math.sin(camPhi);
            const camPos = new THREE.Vector3(cx, cy, cz);
            
            const camDir = new THREE.Vector3().subVectors(new THREE.Vector3(0,0,0), camPos).normalize();
            const camRight = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0,1,0)).normalize();
            const camUp = new THREE.Vector3().crossVectors(camRight, camDir).normalize();
            
            uniforms.u_camPos.value.copy(camPos);
            uniforms.u_camDir.value.copy(camDir);
            uniforms.u_camUp.value.copy(camUp);
            uniforms.u_camRight.value.copy(camRight);
            
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
